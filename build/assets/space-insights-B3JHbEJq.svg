<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180">
  <defs>
    <linearGradient id="si-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081A1E"/>
      <stop offset="50%" stop-color="#0C2428"/>
      <stop offset="100%" stop-color="#061418"/>
    </linearGradient>
    <radialGradient id="si-center-glow" cx="50%" cy="60%">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="si-bar1" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#006878"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>
    <linearGradient id="si-bar2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
    <linearGradient id="si-bar3" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#00838F"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <linearGradient id="si-bar4" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#00ACC1"/>
      <stop offset="100%" stop-color="#4DD0E1"/>
    </linearGradient>
    <linearGradient id="si-bar5" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
    <linearGradient id="si-line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4DD0E1"/>
    </linearGradient>
    <filter id="si-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="si-dotglow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="180" fill="url(#si-bg)"/>
  <rect width="240" height="180" fill="url(#si-center-glow)"/>

  <!-- Grid lines -->
  <g stroke="#1A3438" stroke-width="0.5" opacity="0.5">
    <line x1="35" y1="40" x2="35" y2="145"/>
    <line x1="35" y1="145" x2="210" y2="145"/>
    <!-- Horizontal grid -->
    <line x1="35" y1="120" x2="210" y2="120" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="35" y1="95" x2="210" y2="95" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="35" y1="70" x2="210" y2="70" stroke-dasharray="3,3" opacity="0.3"/>
    <line x1="35" y1="45" x2="210" y2="45" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <!-- Y-axis labels -->
  <g fill="#4A6A70" font-size="7" font-family="Inter,sans-serif" text-anchor="end">
    <text x="32" y="147">0</text>
    <text x="32" y="122">25</text>
    <text x="32" y="97">50</text>
    <text x="32" y="72">75</text>
    <text x="32" y="47">100</text>
  </g>

  <!-- Bars -->
  <g filter="url(#si-shadow)">
    <!-- Bar 1 - shortest -->
    <rect x="48" y="118" width="22" height="27" rx="3" fill="url(#si-bar1)"/>
    <rect x="48" y="118" width="22" height="4" rx="2" fill="white" opacity="0.08"/>

    <!-- Bar 2 -->
    <rect x="80" y="100" width="22" height="45" rx="3" fill="url(#si-bar2)"/>
    <rect x="80" y="100" width="22" height="4" rx="2" fill="white" opacity="0.08"/>

    <!-- Bar 3 -->
    <rect x="112" y="88" width="22" height="57" rx="3" fill="url(#si-bar3)"/>
    <rect x="112" y="88" width="22" height="4" rx="2" fill="white" opacity="0.08"/>

    <!-- Bar 4 -->
    <rect x="144" y="72" width="22" height="73" rx="3" fill="url(#si-bar4)"/>
    <rect x="144" y="72" width="22" height="4" rx="2" fill="white" opacity="0.08"/>

    <!-- Bar 5 - tallest -->
    <rect x="176" y="52" width="22" height="93" rx="3" fill="url(#si-bar5)"/>
    <rect x="176" y="52" width="22" height="4" rx="2" fill="white" opacity="0.1"/>
  </g>

  <!-- Trend line -->
  <polyline
    points="59,112 91,96 123,82 155,66 187,48"
    fill="none"
    stroke="url(#si-line-grad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Data points on trend line -->
  <g filter="url(#si-dotglow)">
    <circle cx="59" cy="112" r="3.5" fill="#00BCD4" opacity="0.9"/>
    <circle cx="59" cy="112" r="1.5" fill="white" opacity="0.6"/>

    <circle cx="91" cy="96" r="3.5" fill="#00BCD4" opacity="0.9"/>
    <circle cx="91" cy="96" r="1.5" fill="white" opacity="0.6"/>

    <circle cx="123" cy="82" r="3.5" fill="#00BCD4" opacity="0.9"/>
    <circle cx="123" cy="82" r="1.5" fill="white" opacity="0.6"/>

    <circle cx="155" cy="66" r="3.5" fill="#00BCD4" opacity="0.9"/>
    <circle cx="155" cy="66" r="1.5" fill="white" opacity="0.6"/>

    <circle cx="187" cy="48" r="4" fill="#4DD0E1"/>
    <circle cx="187" cy="48" r="2" fill="white" opacity="0.7"/>
  </g>

  <!-- Arrow indicator at top -->
  <g transform="translate(187,32)" fill="#4DD0E1" opacity="0.7">
    <polygon points="0,8 -4,14 4,14"/>
    <line x1="0" y1="14" x2="0" y2="22" stroke="#4DD0E1" stroke-width="1.5"/>
  </g>

  <!-- Percentage label -->
  <text x="187" y="28" fill="#4DD0E1" font-size="9" font-family="Inter,sans-serif" text-anchor="middle" font-weight="600" opacity="0.8">+94%</text>

  <!-- Floor reflection -->
  <ellipse cx="125" cy="162" rx="80" ry="8" fill="#00BCD4" opacity="0.03"/>
</svg>
