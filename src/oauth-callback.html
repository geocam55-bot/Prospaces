<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin: 0 0 1rem 0;
        }
        p {
            color: #666;
            margin: 0.5rem 0;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background-color: #fee;
            border: 1px solid #fcc;
            color: #c33;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
        .success {
            background-color: #efe;
            border: 1px solid #cfc;
            color: #3c3;
            padding: 1rem;
            border-radius: 4px;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Connecting...</h1>
        <div class="spinner"></div>
        <p id="status">Processing your authentication...</p>
    </div>

    <script>
        (async () => {
            try {
                // Get URL parameters
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');
                const state = params.get('state');
                const error = params.get('error');
                const errorDescription = params.get('error_description');

                const statusEl = document.getElementById('status');
                const container = document.querySelector('.container');

                if (error) {
                    statusEl.textContent = errorDescription || error;
                    container.innerHTML += `<div class="error">Error: ${errorDescription || error}</div>`;
                    
                    // Notify parent window
                    window.opener.postMessage({
                        type: 'outlook-oauth-error',
                        error: errorDescription || error
                    }, window.location.origin);
                    
                    setTimeout(() => window.close(), 3000);
                    return;
                }

                if (!code) {
                    throw new Error('No authorization code received');
                }

                // Post message to parent with code and state
                // The parent window will handle the exchange
                statusEl.textContent = 'Authenticating...';
                
                window.opener.postMessage({
                    type: 'outlook-oauth-code',
                    code: code,
                    state: state
                }, window.location.origin);

                statusEl.textContent = 'Success! You can close this window.';
                container.innerHTML += '<div class="success">Authentication successful! Closing...</div>';
                
                setTimeout(() => window.close(), 2000);
            } catch (err) {
                const statusEl = document.getElementById('status');
                const container = document.querySelector('.container');
                statusEl.textContent = err.message;
                container.innerHTML += `<div class="error">Error: ${err.message}</div>`;
                
                window.opener.postMessage({
                    type: 'outlook-oauth-error',
                    error: err.message
                }, window.location.origin);
                
                setTimeout(() => window.close(), 3000);
            }
        })();
    </script>
</body>
</html>
