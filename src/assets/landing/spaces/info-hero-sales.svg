<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#EFF6FF"/>
  
  <!-- Pipeline visualization -->
  <!-- Stage 1: Lead -->
  <rect x="60" y="80" width="140" height="240" rx="16" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="130" y="115" text-anchor="middle" fill="#1E40AF" font-size="14" font-weight="700">LEADS</text>
  <rect x="76" y="132" width="108" height="40" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="94" cy="152" r="10" fill="#3B82F6" opacity="0.2"/><circle cx="94" cy="152" r="6" fill="#3B82F6"/>
  <text x="110" y="156" fill="#1E40AF" font-size="11" font-weight="500">J. Thompson</text>
  <rect x="76" y="180" width="108" height="40" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="94" cy="200" r="10" fill="#3B82F6" opacity="0.2"/><circle cx="94" cy="200" r="6" fill="#3B82F6"/>
  <text x="110" y="204" fill="#1E40AF" font-size="11" font-weight="500">M. Rodriguez</text>
  <rect x="76" y="228" width="108" height="40" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="94" cy="248" r="10" fill="#3B82F6" opacity="0.2"/><circle cx="94" cy="248" r="6" fill="#3B82F6"/>
  <text x="110" y="252" fill="#1E40AF" font-size="11" font-weight="500">S. Williams</text>

  <!-- Stage 2: Qualified -->
  <rect x="220" y="80" width="140" height="240" rx="16" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
  <text x="290" y="115" text-anchor="middle" fill="#1E40AF" font-size="14" font-weight="700">QUALIFIED</text>
  <rect x="236" y="132" width="108" height="40" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="254" cy="152" r="10" fill="#2563EB" opacity="0.2"/><circle cx="254" cy="152" r="6" fill="#2563EB"/>
  <text x="270" y="156" fill="#1E40AF" font-size="11" font-weight="500">A. Patel</text>
  <rect x="236" y="180" width="108" height="40" rx="8" fill="white" stroke="#BFDBFE" stroke-width="1"/>
  <circle cx="254" cy="200" r="10" fill="#2563EB" opacity="0.2"/><circle cx="254" cy="200" r="6" fill="#2563EB"/>
  <text x="270" y="204" fill="#1E40AF" font-size="11" font-weight="500">K. Chen</text>

  <!-- Stage 3: Proposal -->
  <rect x="380" y="80" width="140" height="240" rx="16" fill="#C7D2FE" stroke="#818CF8" stroke-width="1.5"/>
  <text x="450" y="115" text-anchor="middle" fill="#3730A3" font-size="14" font-weight="700">PROPOSAL</text>
  <rect x="396" y="132" width="108" height="40" rx="8" fill="white" stroke="#C7D2FE" stroke-width="1"/>
  <circle cx="414" cy="152" r="10" fill="#4F46E5" opacity="0.2"/><circle cx="414" cy="152" r="6" fill="#4F46E5"/>
  <text x="430" y="156" fill="#3730A3" font-size="11" font-weight="500">B. Johnson</text>
  <text x="450" y="176" text-anchor="middle" fill="#6366F1" font-size="10">$24,500</text>

  <!-- Stage 4: Won -->
  <rect x="540" y="80" width="140" height="240" rx="16" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="610" y="115" text-anchor="middle" fill="#166534" font-size="14" font-weight="700">WON</text>
  <rect x="556" y="132" width="108" height="40" rx="8" fill="white" stroke="#BBF7D0" stroke-width="1"/>
  <circle cx="574" cy="152" r="10" fill="#22C55E" opacity="0.2"/><circle cx="574" cy="152" r="6" fill="#22C55E"/>
  <text x="590" y="156" fill="#166534" font-size="11" font-weight="500">L. Martinez</text>
  <text x="610" y="176" text-anchor="middle" fill="#16A34A" font-size="10">$32,000 ✓</text>

  <!-- Flow arrows -->
  <path d="M200 200 L220 200" stroke="#93C5FD" stroke-width="2" stroke-dasharray="4 2"/>
  <path d="M360 200 L380 200" stroke="#818CF8" stroke-width="2" stroke-dasharray="4 2"/>
  <path d="M520 200 L540 200" stroke="#86EFAC" stroke-width="2" stroke-dasharray="4 2"/>

  <!-- Stats panel -->
  <rect x="700" y="90" width="80" height="220" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <text x="740" y="120" text-anchor="middle" fill="#64748B" font-size="9" font-weight="600">PIPELINE</text>
  <text x="740" y="150" text-anchor="middle" fill="#1E40AF" font-size="20" font-weight="800">$89K</text>
  <text x="740" y="168" text-anchor="middle" fill="#64748B" font-size="9">Total Value</text>
  <line x1="715" y1="180" x2="765" y2="180" stroke="#E2E8F0" stroke-width="1"/>
  <text x="740" y="205" text-anchor="middle" fill="#22C55E" font-size="18" font-weight="800">67%</text>
  <text x="740" y="220" text-anchor="middle" fill="#64748B" font-size="9">Win Rate</text>
  <line x1="715" y1="232" x2="765" y2="232" stroke="#E2E8F0" stroke-width="1"/>
  <text x="740" y="258" text-anchor="middle" fill="#F59E0B" font-size="18" font-weight="800">12</text>
  <text x="740" y="273" text-anchor="middle" fill="#64748B" font-size="9">Active Deals</text>
</svg>