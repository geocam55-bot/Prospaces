<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#ECFDF5"/>
  
  <!-- Product grid header -->
  <rect x="40" y="50" width="520" height="42" rx="10" fill="white" stroke="#A7F3D0" stroke-width="1"/>
  <text x="60" y="76" fill="#047857" font-size="12" font-weight="700">SKU</text>
  <text x="160" y="76" fill="#047857" font-size="12" font-weight="700">Product Name</text>
  <text x="340" y="76" fill="#047857" font-size="12" font-weight="700">Stock</text>
  <text x="420" y="76" fill="#047857" font-size="12" font-weight="700">Price</text>
  <text x="500" y="76" fill="#047857" font-size="12" font-weight="700">Status</text>
  
  <!-- Row 1 -->
  <rect x="40" y="96" width="520" height="42" rx="0" fill="white" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="60" y="122" fill="#64748B" font-size="11">LBR-2X4-8</text>
  <text x="160" y="122" fill="#1E293B" font-size="11" font-weight="500">2×4 SPF Stud 8ft</text>
  <text x="340" y="122" fill="#1E293B" font-size="11" font-weight="600">2,450</text>
  <text x="420" y="122" fill="#1E293B" font-size="11">$4.28</text>
  <rect x="495" y="110" width="52" height="20" rx="10" fill="#DCFCE7"/>
  <text x="521" y="124" text-anchor="middle" fill="#16A34A" font-size="9" font-weight="600">In Stock</text>
  
  <!-- Row 2 -->
  <rect x="40" y="140" width="520" height="42" rx="0" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="60" y="166" fill="#64748B" font-size="11">PLY-3/4-4X8</text>
  <text x="160" y="166" fill="#1E293B" font-size="11" font-weight="500">¾" Plywood 4×8</text>
  <text x="340" y="166" fill="#1E293B" font-size="11" font-weight="600">340</text>
  <text x="420" y="166" fill="#1E293B" font-size="11">$52.99</text>
  <rect x="495" y="154" width="52" height="20" rx="10" fill="#DCFCE7"/>
  <text x="521" y="168" text-anchor="middle" fill="#16A34A" font-size="9" font-weight="600">In Stock</text>
  
  <!-- Row 3 -->
  <rect x="40" y="184" width="520" height="42" rx="0" fill="white" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="60" y="210" fill="#64748B" font-size="11">HW-LAG-3/8</text>
  <text x="160" y="210" fill="#1E293B" font-size="11" font-weight="500">Lag Bolt ⅜×4"</text>
  <text x="340" y="210" fill="#DC2626" font-size="11" font-weight="600">18</text>
  <text x="420" y="210" fill="#1E293B" font-size="11">$1.89</text>
  <rect x="495" y="198" width="52" height="20" rx="10" fill="#FEF2F2"/>
  <text x="521" y="212" text-anchor="middle" fill="#DC2626" font-size="9" font-weight="600">Low</text>
  
  <!-- Row 4 -->
  <rect x="40" y="228" width="520" height="42" rx="0" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="60" y="254" fill="#64748B" font-size="11">RTG-COMP-16</text>
  <text x="160" y="254" fill="#1E293B" font-size="11" font-weight="500">Composite Decking 16ft</text>
  <text x="340" y="254" fill="#1E293B" font-size="11" font-weight="600">860</text>
  <text x="420" y="254" fill="#1E293B" font-size="11">$38.50</text>
  <rect x="495" y="242" width="52" height="20" rx="10" fill="#DCFCE7"/>
  <text x="521" y="256" text-anchor="middle" fill="#16A34A" font-size="9" font-weight="600">In Stock</text>
  
  <!-- Row 5 -->
  <rect x="40" y="272" width="520" height="42" rx="0" fill="white" stroke="#D1FAE5" stroke-width="0.5"/>
  <text x="60" y="298" fill="#64748B" font-size="11">INS-R30-23</text>
  <text x="160" y="298" fill="#1E293B" font-size="11" font-weight="500">R-30 Insulation 23"</text>
  <text x="340" y="298" fill="#F59E0B" font-size="11" font-weight="600">45</text>
  <text x="420" y="298" fill="#1E293B" font-size="11">$28.75</text>
  <rect x="495" y="286" width="52" height="20" rx="10" fill="#FEF9C3"/>
  <text x="521" y="300" text-anchor="middle" fill="#CA8A04" font-size="9" font-weight="600">Reorder</text>

  <!-- Summary cards -->
  <rect x="590" y="50" width="180" height="90" rx="14" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="610" y="78" fill="#64748B" font-size="10" font-weight="600">TOTAL PRODUCTS</text>
  <text x="610" y="112" fill="#059669" font-size="28" font-weight="800">1,247</text>
  <text x="610" y="128" fill="#64748B" font-size="10">across 8 categories</text>

  <rect x="590" y="155" width="180" height="90" rx="14" fill="white" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="610" y="183" fill="#64748B" font-size="10" font-weight="600">INVENTORY VALUE</text>
  <text x="610" y="217" fill="#059669" font-size="28" font-weight="800">$2.4M</text>
  <text x="610" y="233" fill="#64748B" font-size="10">total stock value</text>

  <rect x="590" y="260" width="180" height="90" rx="14" fill="white" stroke="#FEE2E2" stroke-width="1.5"/>
  <text x="610" y="288" fill="#64748B" font-size="10" font-weight="600">LOW STOCK ALERTS</text>
  <text x="610" y="322" fill="#DC2626" font-size="28" font-weight="800">23</text>
  <text x="610" y="338" fill="#64748B" font-size="10">items need reorder</text>
</svg>