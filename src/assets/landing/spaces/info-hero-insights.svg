<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" rx="24" fill="#F0F9FF"/>
  
  <!-- Main chart area -->
  <rect x="40" y="50" width="500" height="300" rx="16" fill="white" stroke="#BAE6FD" stroke-width="1"/>
  <text x="60" y="80" fill="#0C4A6E" font-size="14" font-weight="700">Revenue Overview — Q4 2025</text>
  <text x="60" y="96" fill="#64748B" font-size="10">Monthly revenue breakdown by source</text>
  
  <!-- Chart axes -->
  <line x1="80" y1="110" x2="80" y2="310" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="80" y1="310" x2="510" y2="310" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Y-axis labels -->
  <text x="72" y="118" text-anchor="end" fill="#94A3B8" font-size="9">$500K</text>
  <text x="72" y="160" text-anchor="end" fill="#94A3B8" font-size="9">$375K</text>
  <text x="72" y="210" text-anchor="end" fill="#94A3B8" font-size="9">$250K</text>
  <text x="72" y="260" text-anchor="end" fill="#94A3B8" font-size="9">$125K</text>
  <text x="72" y="313" text-anchor="end" fill="#94A3B8" font-size="9">$0</text>
  
  <!-- Grid lines -->
  <line x1="80" y1="155" x2="510" y2="155" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="80" y1="205" x2="510" y2="205" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="80" y1="255" x2="510" y2="255" stroke="#F1F5F9" stroke-width="1"/>
  
  <!-- Bar groups: Oct, Nov, Dec -->
  <!-- October -->
  <rect x="120" y="170" width="32" height="140" rx="4" fill="#0EA5E9" opacity="0.8"/>
  <rect x="156" y="200" width="32" height="110" rx="4" fill="#38BDF8" opacity="0.6"/>
  <rect x="192" y="230" width="32" height="80" rx="4" fill="#7DD3FC" opacity="0.5"/>
  <text x="172" y="332" text-anchor="middle" fill="#64748B" font-size="11" font-weight="500">Oct</text>
  
  <!-- November -->
  <rect x="270" y="140" width="32" height="170" rx="4" fill="#0EA5E9" opacity="0.8"/>
  <rect x="306" y="180" width="32" height="130" rx="4" fill="#38BDF8" opacity="0.6"/>
  <rect x="342" y="215" width="32" height="95" rx="4" fill="#7DD3FC" opacity="0.5"/>
  <text x="322" y="332" text-anchor="middle" fill="#64748B" font-size="11" font-weight="500">Nov</text>
  
  <!-- December -->
  <rect x="420" y="120" width="32" height="190" rx="4" fill="#0EA5E9" opacity="0.8"/>
  <rect x="456" y="160" width="32" height="150" rx="4" fill="#38BDF8" opacity="0.6"/>
  <text x="452" y="332" text-anchor="middle" fill="#64748B" font-size="11" font-weight="500">Dec</text>
  
  <!-- Legend -->
  <rect x="380" y="72" width="8" height="8" rx="2" fill="#0EA5E9"/>
  <text x="394" y="80" fill="#64748B" font-size="9">Projects</text>
  <rect x="430" y="72" width="8" height="8" rx="2" fill="#38BDF8"/>
  <text x="444" y="80" fill="#64748B" font-size="9">Materials</text>
  <rect x="482" y="72" width="8" height="8" rx="2" fill="#7DD3FC"/>
  <text x="496" y="80" fill="#64748B" font-size="9">Services</text>

  <!-- KPI cards -->
  <rect x="570" y="50" width="200" height="76" rx="14" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="590" y="76" fill="#64748B" font-size="10" font-weight="600">QUARTERLY REVENUE</text>
  <text x="590" y="104" fill="#0369A1" font-size="24" font-weight="800">$1.28M</text>
  <text x="720" y="104" fill="#22C55E" font-size="11" font-weight="600">↑ 18%</text>

  <rect x="570" y="140" width="200" height="76" rx="14" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="590" y="166" fill="#64748B" font-size="10" font-weight="600">AVG DEAL SIZE</text>
  <text x="590" y="194" fill="#0369A1" font-size="24" font-weight="800">$24.5K</text>
  <text x="720" y="194" fill="#22C55E" font-size="11" font-weight="600">↑ 12%</text>

  <rect x="570" y="230" width="200" height="76" rx="14" fill="white" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="590" y="256" fill="#64748B" font-size="10" font-weight="600">TEAM PERFORMANCE</text>
  <text x="590" y="284" fill="#0369A1" font-size="24" font-weight="800">94%</text>
  <text x="648" y="284" fill="#64748B" font-size="11">quota attainment</text>

  <!-- Donut chart summary -->
  <rect x="570" y="320" width="200" height="30" rx="8" fill="#0EA5E9"/>
  <text x="670" y="340" text-anchor="middle" fill="white" font-size="11" font-weight="600">View Full Report →</text>
</svg>